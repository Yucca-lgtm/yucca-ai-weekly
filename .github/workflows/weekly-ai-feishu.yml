# 每周五北京时间 10:00 向飞书群推送 AI 周报（简体中文）
# GitHub Actions 使用 UTC：北京时间周五 10:00 = UTC 周五 02:00
#
# 仓库 Settings → Secrets and variables → Actions 中新建：
#   FEISHU_WEBHOOK     必填：飞书自定义机器人 Webhook 完整地址
#   MYMEMORY_EMAIL     可选：在 mymemory.translated.net 登记过的邮箱，可提高免费翻译日额度
#
# 若机器人在飞书里启用了「关键词」安全策略，请把关键词设为「AI周报」（正文已包含该词）。

name: Weekly AI digest to Feishu

on:
  schedule:
    # UTC 周五 02:00 = 北京时间周五 10:00
    - cron: "0 2 * * 5"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest and push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          MYMEMORY_EMAIL: ${{ secrets.MYMEMORY_EMAIL }}
        run: python scripts/weekly_ai_digest.py
